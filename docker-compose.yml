services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pedalmind
      POSTGRES_PASSWORD: pedalmind
      POSTGRES_DB: pedalmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedalmind"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
